{% extends "layout.html" %}

{% block title %}Login{% endblock %}

{% block content %}
  <section class="rc-card rc-card-center">
    <h1>Login</h1>
    {% if error %}
      <p class="rc-error">{{ error }}</p>
    {% endif %}
    <form method="post" class="rc-form">
      <label>
        Usuário
        <input type="text" name="username" required />
      </label>
      <label>
        Senha
        <input type="password" name="password" required />
      </label>
      <button type="submit" class="rc-button">Entrar</button>
    </form>
  </section>
{% endblock %}
