{% extends "layout.html" %}

{% block title %}Nova notificação{% endblock %}

{% block content %}
  <section class="rc-card">
    <h1>Nova notificação</h1>

    {% if error %}
      <p class="rc-error">{{ error }}</p>
    {% endif %}

    <form method="post" class="rc-form">
      <label>
        Título
        <input type="text" name="title" required value="{{ title or '' }}" />
      </label>

      <label>
        Mensagem
        <textarea name="body" rows="3" required>{{ body or '' }}</textarea>
      </label>

      <label>
        Link ao tocar (opcional)
        <input type="text" name="target_url" value="{{ target_url or '' }}" placeholder="https://..." />
      </label>

      <button type="submit" class="rc-button rc-button-primary">Enviar</button>
    </form>
  </section>
{% endblock %}
